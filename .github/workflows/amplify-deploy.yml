# Push GitHub secrets into AWS Amplify and trigger an SSR build.
#
# Why this exists: this is a Next.js SSR app, so Amplify must build it through
# its Git connection — and that build reads env vars from Amplify, not from
# GitHub. This workflow bridges the gap: on every push to main it syncs your
# GitHub secrets into the Amplify branch's environment variables, then kicks off
# an Amplify release build.
#
# ── One-time setup ───────────────────────────────────────────────────────────
# 1. In the Amplify console, connect this GitHub repo (Host web app → GitHub →
#    this repo → main). Amplify auto-detects Next.js SSR and uses amplify.yml.
# 2. Turn OFF automatic builds for the branch (Amplify → Branch settings →
#    "Disable auto build") so only this workflow triggers builds — otherwise you
#    get a double build per push.
# 3. Add repo secrets (Settings → Secrets and variables → Actions):
#      AMPLIFY_APP_ID                     (from the Amplify app — e.g. d123abc456)
#      AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
#      ADMIN_API_TOKEN, BACKEND_API_URL
#      NEXT_PUBLIC_COGNITO_USER_POOL_ID, NEXT_PUBLIC_COGNITO_CLIENT_ID
#      NEXT_PUBLIC_API_BASE_URL           (optional)
#    Optional repo variable: AMPLIFY_BRANCH (defaults to "main").
# 4. The IAM user behind the AWS keys needs: amplify:UpdateBranch, amplify:StartJob.
#
# Note: update-branch REPLACES the branch env vars, so this file is the single
# source of truth — every var the app needs must be listed in the sync step.

name: Deploy to Amplify

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: amplify-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check configuration
        id: cfg
        run: |
          if [ -z "${{ secrets.AMPLIFY_APP_ID }}" ]; then
            echo "::warning::AMPLIFY_APP_ID secret is not set — skipping deploy. Create the Amplify app and add AMPLIFY_APP_ID, then re-run."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.cfg.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync env vars to Amplify
        if: steps.cfg.outputs.ready == 'true'
        env:
          APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          BRANCH: ${{ vars.AMPLIFY_BRANCH || 'main' }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          # Build the env-var map as JSON so values are safely escaped.
          jq -n \
            --arg a "$ADMIN_API_TOKEN" \
            --arg b "$BACKEND_API_URL" \
            --arg p "$NEXT_PUBLIC_COGNITO_USER_POOL_ID" \
            --arg c "$NEXT_PUBLIC_COGNITO_CLIENT_ID" \
            --arg u "$NEXT_PUBLIC_API_BASE_URL" \
            '{
               ADMIN_API_TOKEN: $a,
               BACKEND_API_URL: $b,
               NEXT_PUBLIC_COGNITO_USER_POOL_ID: $p,
               NEXT_PUBLIC_COGNITO_CLIENT_ID: $c
             } + (if $u == "" then {} else { NEXT_PUBLIC_API_BASE_URL: $u } end)' > envvars.json

          aws amplify update-branch \
            --app-id "$APP_ID" \
            --branch-name "$BRANCH" \
            --environment-variables file://envvars.json

          rm -f envvars.json
          echo "Synced environment variables to Amplify branch '$BRANCH'."

      - name: Trigger Amplify build
        if: steps.cfg.outputs.ready == 'true'
        env:
          APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          BRANCH: ${{ vars.AMPLIFY_BRANCH || 'main' }}
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id "$APP_ID" \
            --branch-name "$BRANCH" \
            --job-type RELEASE \
            --query 'jobSummary.jobId' --output text)
          echo "Started Amplify release job $JOB_ID on branch '$BRANCH'."
          echo "Track it: https://$AWS_REGION.console.aws.amazon.com/amplify/home?region=$AWS_REGION#/$APP_ID/$BRANCH/$JOB_ID"
        # AWS_REGION is exported into the env by configure-aws-credentials
